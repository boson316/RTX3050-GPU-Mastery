# CI: Lint & Test (Python only; CUDA build requires GPU toolchain)
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Lint (ruff)
        run: ruff check . --ignore E501 || true

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyTorch (CPU for CI)
        run: pip install torch torchvision
      - name: Run Python tests (no CUDA)
        run: |
          python -c "import torch; print(torch.__version__)"
          if [ -f pytorch/mnist_gpu.py ]; then echo "mnist_gpu.py present"; fi
          if [ -f triton/conv_triton.py ]; then echo "triton conv present"; fi
